services:
  ball_tracker:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: turtlesim_ball_tracker
    environment:
      - DISPLAY=host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./ros2_ws:/workspace/ros2_ws
      - ./run_tracker.sh:/workspace/run_tracker.sh
    working_dir: /workspace/ros2_ws
    command: bash /workspace/run_tracker.sh
