name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install pytest
        run: pip install pytest

      - name: run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/ros2_ws/src/ball_tracker
          pytest ros2_ws/tests/test_pid.py -v